name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag name
        required: true
        type: string
      release_name:
        description: Optional release title
        required: false
        type: string
      prerelease:
        description: Mark this release as prerelease
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: read
    env:
      PYTHON_VERSION: "3.13.0"
      NUITKA_VERSION: "2.8.10"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"
      NUITKA_CACHE_DIR: ${{ github.workspace }}\.nuitka-cache
      NUITKA_CACHE_DIR_DOWNLOADS: ${{ github.workspace }}\.nuitka-cache\downloads
      NUITKA_CACHE_DIR_BYTECODE: ${{ github.workspace }}\.nuitka-cache\bytecode
      NUITKA_CACHE_DIR_DLL_DEPENDENCIES: ${{ github.workspace }}\.nuitka-cache\dll-dependencies
      NUITKA_CACHE_DIR_CLCACHE: ${{ github.workspace }}\.nuitka-cache\clcache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Restore Nuitka cache
        id: nuitka-cache
        uses: actions/cache/restore@v4
        with:
          path: .nuitka-cache
          key: ${{ runner.os }}-nuitka-msvc-win2022-py3130-v5-${{ env.NUITKA_VERSION }}-${{ hashFiles('requirements.txt') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nuitka-msvc-win2022-py3130-v5-${{ env.NUITKA_VERSION }}-${{ hashFiles('requirements.txt') }}-
            ${{ runner.os }}-nuitka-msvc-win2022-py3130-v5-${{ env.NUITKA_VERSION }}-
            ${{ runner.os }}-nuitka-msvc-win2022-py3130-v5-

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Prepare Nuitka cache directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path `
            $env:NUITKA_CACHE_DIR, `
            $env:NUITKA_CACHE_DIR_DOWNLOADS, `
            $env:NUITKA_CACHE_DIR_BYTECODE, `
            $env:NUITKA_CACHE_DIR_DLL_DEPENDENCIES, `
            $env:NUITKA_CACHE_DIR_CLCACHE | Out-Null

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements.txt nuitka==${{ env.NUITKA_VERSION }} ordered-set zstandard

      - name: Build desktop application with Nuitka
        shell: pwsh
        run: |
          $jobs = [Math]::Max([int]$env:NUMBER_OF_PROCESSORS, 1)
          python -m nuitka `
            --standalone `
            --assume-yes-for-downloads `
            --enable-plugin=pyqt5 `
            --plugin-no-detection `
            --windows-console-mode=disable `
            --lto=no `
            --jobs=$jobs `
            --progress-bar=none `
            --include-module=websockets.asyncio.server `
            --include-module=websockets.server `
            --include-data-dir=resource=resource `
            --output-dir=build `
            --output-filename=ChaoxingDesktop.exe `
            desktop_app.py

      - name: Save Nuitka cache
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: .nuitka-cache
          key: ${{ runner.os }}-nuitka-msvc-win2022-py3130-v5-${{ env.NUITKA_VERSION }}-${{ hashFiles('requirements.txt') }}-${{ github.sha }}

      - name: Prepare release assets
        shell: pwsh
        run: |
          python scripts/prepare_release.py `
            --build-dir build `
            --release-dir release `
            --tag "${{ inputs.tag_name }}" `
            --ref-name "${{ github.ref_name }}" `
            --sha "${{ github.sha }}"

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: |
            release/*.zip
            release/RELEASE_NOTES.md
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: release

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_NAME="${{ inputs.release_name }}"
          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="${{ inputs.tag_name }}"
          fi
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN || github.token }}
          tag_name: ${{ inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.release_name }}
          body_path: release/RELEASE_NOTES.md
          prerelease: ${{ inputs.prerelease }}
          files: release/*.zip
