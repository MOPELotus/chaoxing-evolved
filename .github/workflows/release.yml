name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag name
        required: true
        type: string
      release_name:
        description: Optional release title
        required: false
        type: string
      prerelease:
        description: Mark this release as prerelease
        required: true
        default: true
        type: boolean
      windows_arch:
        description: Windows build architecture
        required: true
        default: arm64
        type: choice
        options:
          - arm64
          - x64
          - both

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.13"
  NUITKA_VERSION: "2.8.10"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

jobs:
  build-x64:
    if: ${{ inputs.windows_arch == 'x64' || inputs.windows_arch == 'both' }}
    runs-on: windows-2022
    permissions:
      contents: read
    env:
      BUILD_ARCH: x64
      RUNNER_KEY: win2022
      NUITKA_CACHE_DIR: ${{ github.workspace }}\.nuitka-cache
      NUITKA_CACHE_DIR_DOWNLOADS: ${{ github.workspace }}\.nuitka-cache\downloads
      NUITKA_CACHE_DIR_BYTECODE: ${{ github.workspace }}\.nuitka-cache\bytecode
      NUITKA_CACHE_DIR_DLL_DEPENDENCIES: ${{ github.workspace }}\.nuitka-cache\dll-dependencies
      NUITKA_CACHE_DIR_CLCACHE: ${{ github.workspace }}\.nuitka-cache\clcache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64
          cache: pip

      - name: Restore Nuitka cache
        uses: actions/cache/restore@v4
        with:
          path: .nuitka-cache
          key: ${{ runner.os }}-${{ env.RUNNER_KEY }}-${{ env.BUILD_ARCH }}-nuitka-v1-${{ env.NUITKA_VERSION }}-${{ hashFiles('requirements.txt') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ env.RUNNER_KEY }}-${{ env.BUILD_ARCH }}-nuitka-v1-${{ env.NUITKA_VERSION }}-${{ hashFiles('requirements.txt') }}-
            ${{ runner.os }}-${{ env.RUNNER_KEY }}-${{ env.BUILD_ARCH }}-nuitka-v1-${{ env.NUITKA_VERSION }}-
            ${{ runner.os }}-${{ env.RUNNER_KEY }}-${{ env.BUILD_ARCH }}-nuitka-v1-

      - name: Prepare Nuitka cache directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path `
            $env:NUITKA_CACHE_DIR, `
            $env:NUITKA_CACHE_DIR_DOWNLOADS, `
            $env:NUITKA_CACHE_DIR_BYTECODE, `
            $env:NUITKA_CACHE_DIR_DLL_DEPENDENCIES, `
            $env:NUITKA_CACHE_DIR_CLCACHE | Out-Null

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements.txt nuitka==${{ env.NUITKA_VERSION }} ordered-set zstandard

      - name: Build desktop application
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\build_release_local.ps1 `
            -Tag "${{ inputs.tag_name }}" `
            -Architecture "${{ env.BUILD_ARCH }}" `
            -OutputDir "build-${{ env.BUILD_ARCH }}" `
            -ReleaseDir "release"

      - name: Save Nuitka cache
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: .nuitka-cache
          key: ${{ runner.os }}-${{ env.RUNNER_KEY }}-${{ env.BUILD_ARCH }}-nuitka-v1-${{ env.NUITKA_VERSION }}-${{ hashFiles('requirements.txt') }}-${{ github.sha }}

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-windows-x64
          path: release/*.zip
          if-no-files-found: error

  build-arm64:
    if: ${{ inputs.windows_arch == 'arm64' || inputs.windows_arch == 'both' }}
    runs-on: windows-11-arm
    permissions:
      contents: read
    env:
      BUILD_ARCH: arm64
      RUNNER_KEY: win11arm
      NUITKA_CACHE_DIR: ${{ github.workspace }}\.nuitka-cache
      NUITKA_CACHE_DIR_DOWNLOADS: ${{ github.workspace }}\.nuitka-cache\downloads
      NUITKA_CACHE_DIR_BYTECODE: ${{ github.workspace }}\.nuitka-cache\bytecode
      NUITKA_CACHE_DIR_DLL_DEPENDENCIES: ${{ github.workspace }}\.nuitka-cache\dll-dependencies
      NUITKA_CACHE_DIR_CLCACHE: ${{ github.workspace }}\.nuitka-cache\clcache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: arm64
          cache: pip

      - name: Restore Nuitka cache
        uses: actions/cache/restore@v4
        with:
          path: .nuitka-cache
          key: ${{ runner.os }}-${{ env.RUNNER_KEY }}-${{ env.BUILD_ARCH }}-nuitka-v1-${{ env.NUITKA_VERSION }}-${{ hashFiles('requirements.txt') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ env.RUNNER_KEY }}-${{ env.BUILD_ARCH }}-nuitka-v1-${{ env.NUITKA_VERSION }}-${{ hashFiles('requirements.txt') }}-
            ${{ runner.os }}-${{ env.RUNNER_KEY }}-${{ env.BUILD_ARCH }}-nuitka-v1-${{ env.NUITKA_VERSION }}-
            ${{ runner.os }}-${{ env.RUNNER_KEY }}-${{ env.BUILD_ARCH }}-nuitka-v1-

      - name: Prepare Nuitka cache directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path `
            $env:NUITKA_CACHE_DIR, `
            $env:NUITKA_CACHE_DIR_DOWNLOADS, `
            $env:NUITKA_CACHE_DIR_BYTECODE, `
            $env:NUITKA_CACHE_DIR_DLL_DEPENDENCIES, `
            $env:NUITKA_CACHE_DIR_CLCACHE | Out-Null

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --prefer-binary -r requirements.txt nuitka==${{ env.NUITKA_VERSION }} ordered-set zstandard

      - name: Build desktop application
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\build_release_local.ps1 `
            -Tag "${{ inputs.tag_name }}" `
            -Architecture "${{ env.BUILD_ARCH }}" `
            -OutputDir "build-${{ env.BUILD_ARCH }}" `
            -ReleaseDir "release"

      - name: Save Nuitka cache
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: .nuitka-cache
          key: ${{ runner.os }}-${{ env.RUNNER_KEY }}-${{ env.BUILD_ARCH }}-nuitka-v1-${{ env.NUITKA_VERSION }}-${{ hashFiles('requirements.txt') }}-${{ github.sha }}

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-windows-arm64
          path: release/*.zip
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - build-x64
      - build-arm64
    if: ${{ always() && !cancelled() && (needs.build-x64.result == 'success' || needs.build-arm64.result == 'success') }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          pattern: release-bundle-*
          path: release
          merge-multiple: true

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_NAME="${{ inputs.release_name }}"
          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="${{ inputs.tag_name }}"
          fi
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

          PLATFORM_ARGS=()
          if [ "${{ needs.build-arm64.result }}" = "success" ]; then
            PLATFORM_ARGS+=(--platform-label "Windows ARM64")
          fi
          if [ "${{ needs.build-x64.result }}" = "success" ]; then
            PLATFORM_ARGS+=(--platform-label "Windows x64")
          fi

          python3 scripts/prepare_release.py \
            --release-dir release \
            --tag "${{ inputs.tag_name }}" \
            --ref-name "${{ github.ref_name }}" \
            --sha "${{ github.sha }}" \
            "${PLATFORM_ARGS[@]}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN || github.token }}
          tag_name: ${{ inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.release_name }}
          body_path: release/RELEASE_NOTES.md
          prerelease: ${{ inputs.prerelease }}
          files: release/*.zip
